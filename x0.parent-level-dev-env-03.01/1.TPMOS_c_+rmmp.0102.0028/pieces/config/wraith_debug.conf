# Wraith debug toggles. Read by wraith-alpha_manager.c. Plain key=value,
# '#' comments. Missing file or key -> the built-in defaults are used.

# Whether opening a project window (a fresh launch, OR a previously-open
# window being resumed after the whole manager/Wraith process restarts)
# resets its camera/view to assets/camera_default.txt, if the project
# ships one (piececraft-wraith does). Default 1 (on) — matches shipped
# behavior, always start from a known angle.
#
# Set to 0 while actively debugging camera code: the last session's
# orbited/panned angle then persists across restarts too, instead of
# snapping back to the default every time — which otherwise makes it
# hard to tell "did my fix actually stick" from "the reset just papered
# over it". Flip back to 1 when done debugging.
camera_reset_on_open=1

# Whether the piececraft-wraith 3D map view (wraith_rgb_daemon.c) is
# allowed to draw outside its own game_map widget rect. Default 1 (on) --
# the ground wireframe grid and entity markers (xelector/pet) have always
# projected wherever the math puts them with no clipping; this just makes
# the ray-marched tile/voxel grid (walls/trees/stone/emoji tiles) match
# that same behavior instead of being the one thing strictly boxed in.
#
# Set to 0 to strictly clip EVERYTHING (grid, markers, tiles alike) to
# the widget's own screen rect -- e.g. for a clean capture, or once
# you're done using the overflow to eyeball off-screen geometry.
render_beyond_viewport=1

# True overlapping multi-window support (multi-win-j13.txt). Default 0
# (off) -- when off, launch_window_instance() keeps today's behavior
# EXACTLY (minimize_all_open_windows_except(-1), one window rendered at
# a time). Set to 1 to enable: opening a window brings it to front
# instead of minimizing every other open window, and both renderers
# composite ALL open windows instead of just the focused one. This is
# the single revert switch for the whole feature -- if anything about
# multi-window rendering looks wrong, flip this back to 0 first, no code
# changes needed, before debugging further.
multi_window_enabled=0

# Emoji rendering via FreeType + Noto Color Emoji. Read by wraith_rgb_daemon.c.
# Lazy-loads emoji glyphs on-demand, caches in memory (LRU eviction if full).
# Default enabled=1 (on) — emoji render as voxel quads in GL, UTF-8 or fallback in ASCII.
#
# Set enabled=0 to disable emoji rendering entirely: text falls back to [?] for
# non-ASCII characters, performance may improve on older systems.
#
# font_path: path to TTF file. Default: /usr/share/fonts/truetype/noto/NotoColorEmoji.ttf
# glyph_size: bitmap size per emoji (16x16 typical). Default: 16
# cache_size: max emoji cache entries (LRU evicts oldest). Default: 256
# fallback_to_ascii: if font unavailable, use [?] fallback. Default: 1 (on)
[emoji_rendering]
enabled=1
font_path=/usr/share/fonts/truetype/noto/NotoColorEmoji.ttf
glyph_size=16
cache_size=256
fallback_to_ascii=1
