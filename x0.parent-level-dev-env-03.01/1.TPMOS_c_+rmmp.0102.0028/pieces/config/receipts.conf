# Wraith receipt / audit-history policy.
# Read by wraith-alpha_manager.c. Plain key=value, '#' comments. Missing
# file or key -> the built-in defaults are used.

# --- Snapshot receipt history (pieces/debug/frames/session_receipt_history.txt) ---
# How many receipt snapshots to keep before the oldest are trimmed. Each
# snapshot embeds the full frame receipt (~50KB), so this file is inherently
# the fattest: 50 -> ~2.5MB ceiling. Lower it (e.g. 20 -> ~1MB) if you want
# it smaller; raise it if you want deeper audit history.
max_entries=50

# Only append a new snapshot when the rendered frame actually changed
# (compared by the RGB render checksum). 1 = skip identical re-renders and
# mouse-move noise (the main bloat source); 0 = archive on every state write.
only_on_change=1

# --- Line-based audit logs/ledgers ---
# Applies to the append-only audit files a periodic janitor trims:
#   pieces/display/ledger.txt
#   pieces/master_ledger/master_ledger.txt
#   projects/wraith-alpha/manager/alpha_manager.log
# Keeps only the last N lines of each (lines are short, ~80B, so 500 -> ~40KB,
# comfortably under 100KB). Files read by byte-cursor (history.txt, keyboard
# history) are deliberately NOT trimmed here -- that would desync replay.
max_log_lines=500
